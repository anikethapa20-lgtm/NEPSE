name: Create pnpm lockfile

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.13.1 --activate
          pnpm --version

      - name: Create clean pnpm lockfile
        run: |
          rm -rf node_modules
          rm -f bun.lock bun.lockb package-lock.json pnpm-lock.yaml
          pnpm install --lockfile-only

      - name: Verify install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Commit pnpm lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pnpm-lock.yaml package.json
          git rm -f bun.lock bun.lockb package-lock.json 2>/dev/null || true

          git commit -m "Switch dependency management to pnpm" || exit 0
          git push
