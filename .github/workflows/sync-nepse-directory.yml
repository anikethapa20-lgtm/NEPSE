name: Sync NEPSE Directory

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:
  sync-directory:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - run: bun install

      - name: Sync securities, companies, and disclosures
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bun run scripts/sync-nepse-directory.ts
