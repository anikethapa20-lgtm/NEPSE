name: Sync NEPSE Directory

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:
  sync-directory:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install directory-sync dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install git+https://github.com/basic-bgnr/NepseUnofficialApi.git

      - name: Sync NEPSE company directory
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/sync-nepse-directory.py
