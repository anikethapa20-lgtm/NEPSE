name: Repair package lock

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"
          cache: "npm"

      - name: Confirm versions
        run: |
          node --version
          npm --version

      - name: Regenerate package lock only
        run: |
          rm -rf node_modules package-lock.json
          npm install \
            --package-lock-only \
            --ignore-scripts \
            --no-audit \
            --no-fund

      - name: Validate clean install
        run: |
          npm ci \
            --ignore-scripts \
            --no-audit \
            --no-fund

      - name: Commit repaired lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Regenerate package lock with Node 22" || exit 0
          git push
