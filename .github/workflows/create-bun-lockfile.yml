name: Create Bun lockfile

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-lock:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies with Bun
        run: |
          rm -rf node_modules
          bun install

      - name: Verify production build
        run: bun run build

      - name: Commit Bun lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock bun.lockb package.json 2>/dev/null || true
          git commit -m "Use Bun for dependency installation" || exit 0
          git push
