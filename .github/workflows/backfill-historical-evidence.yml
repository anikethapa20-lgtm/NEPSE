name: Backfill Historical Evidence

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Oldest publication date to collect"
        required: true
        default: "2015-01-01"
      end_date:
        description: "Newest publication date to collect"
        required: true
        default: "2026-12-31"
  schedule:
    - cron: "15 2 1 * *"

jobs:
  backfill:
    name: ${{ matrix.source }}
    runs-on: ubuntu-latest
    timeout-minutes: 55
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        source:
          - sebon-notices
          - sebon-news
          - sebon-prospectus
          - sebon-public-issues
          - nrb-notices
          - gdelt-news

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - run: bun install

      - name: Backfill ${{ matrix.source }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EVIDENCE_SOURCE: ${{ matrix.source }}
          START_DATE: ${{ inputs.start_date || '2015-01-01' }}
          END_DATE: ${{ inputs.end_date || '2026-12-31' }}
        run: bun run scripts/backfill-historical-evidence.ts
